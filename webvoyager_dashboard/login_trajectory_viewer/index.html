<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mage Web Trajectory Review</title>
  <link rel="stylesheet" href="styles.css?v=20260514-scroll3" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">MW</div>
        <div>
          <h1>Mage Web Trajectories</h1>
          <p id="runSubtitle">Multi-run trajectory review</p>
        </div>
      </div>
      <select id="runSelect" class="run-select"></select>
      <div class="summary" id="summary"></div>
      <div class="filters">
        <input id="search" placeholder="Search task, family, answer..." />
        <div class="filter-row">
          <select id="siteFilter"><option value="">All sites</option></select>
          <select id="decisionFilter"><option value="">All decisions</option></select>
        </div>
        <div class="filter-row">
          <select id="policyFilter"><option value="">All policies</option></select>
          <select id="tagFilter"><option value="">All tags</option></select>
        </div>
      </div>
      <div class="task-list" id="taskList"></div>
    </aside>
    <main class="main">
      <section class="hero" id="hero"></section>
      <section class="panel-grid">
        <article class="panel" id="qualityPanel"></article>
        <article class="panel" id="judgePanel"></article>
      </section>
      <section class="attempt-tabs" id="attemptTabs"></section>
      <section class="timeline" id="timeline"></section>
    </main>
  </div>
  <dialog id="imageDialog">
    <button id="closeDialog" class="dialog-close">Close</button>
    <img id="dialogImage" alt="screenshot" src="data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA=" />
  </dialog>
  <script src="app.js?v=20260514-scroll3"></script>
</body>
</html>
