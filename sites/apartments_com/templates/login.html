{% extends "base.html" %}
{% block content %}
<div class="container" style="padding: 24px 20px; max-width: 460px;">
  <h1>Sign in</h1>
  <form method="post" class="section-block">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-field"><label>Email</label><input name="email" type="email" required autofocus></div>
    <div class="form-field"><label>Password</label><input name="password" type="password" required></div>
    <label class="checkbox-row"><input type="checkbox" name="remember"> Keep me signed in</label>
    <button class="btn lg" type="submit" style="width:100%;margin-top:10px;">Sign in</button>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted);">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </p>
  </form>
  <p style="font-size:12px;color:var(--muted);text-align:center;">Benchmark demo accounts: alice.j@test.com / bob.k@test.com / carla.r@test.com / dan.p@test.com — password Password123!</p>
</div>
{% endblock %}
