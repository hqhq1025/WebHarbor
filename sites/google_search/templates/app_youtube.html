{% extends "base.html" %}
{% block title %}YouTube{% endblock %}
{% block content %}
<div class="app-page">
    <h1 style="color:#ff0000;">YouTube</h1>
    <p class="lead">Enjoy the videos and music you love, upload original content, and share it all with friends, family, and the world on YouTube.</p>
    <div class="app-hero-img">
        <img loading="lazy" decoding="async" src="/static/images/topics/piano/img_hero.jpg" alt="YouTube" onerror="this.parentElement.style.display='none'">
    </div>
    <p>This is a demo page. <a href="{{ url_for('search', q='music', tbm='videos') }}">Try video search</a>.</p>
</div>
{% endblock %}
