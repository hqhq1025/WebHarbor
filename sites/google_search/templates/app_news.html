{% extends "base.html" %}
{% block title %}Google News{% endblock %}
{% block content %}
<div class="app-page">
    <h1 style="color:#4285f4;">News</h1>
    <p class="lead">Comprehensive up-to-date news coverage, aggregated from sources all over the world.</p>
    <form action="{{ url_for('search') }}" method="get" style="max-width:580px; margin:24px auto;">
        <div class="search-box">
            <div class="search-icon"><svg viewBox="0 0 24 24" fill="#9aa0a6" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
            <input type="search" name="q" placeholder="Search news">
            <input type="hidden" name="tbm" value="news">
        </div>
    </form>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:14px; margin-top:32px;">
        {% for term in trending_terms[:6] %}
        <a href="{{ url_for('search', q=term.term, tbm='news') }}" class="collection-card">
            <strong>{{ term.term }}</strong>
            <div class="meta">Trending #{{ term.rank }}</div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
