{% extends "base.html" %}
{% block title %}Google Scholar{% endblock %}
{% block content %}
<div class="app-page">
    <h1 style="color:#4285f4;">Scholar</h1>
    <p class="lead">Stand on the shoulders of giants. Google Scholar provides a simple way to broadly search for scholarly literature.</p>
    <form action="{{ url_for('search') }}" method="get" style="max-width:580px; margin:24px auto;">
        <div class="search-box">
            <div class="search-icon">
                <svg viewBox="0 0 24 24" fill="#9aa0a6" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
            <input type="search" name="q" placeholder="Search scholarly articles">
            <input type="hidden" name="tbm" value="books">
        </div>
    </form>
</div>
{% endblock %}
