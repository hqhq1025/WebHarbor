{% extends "base.html" %}
{% block title %}Change password - Google Account{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">Change password</h1>
        <p class="form-subtitle">Use a strong password you don't use elsewhere</p>
        <form method="post">
            {{ form.hidden_tag() }}
            <div class="field">
                <label>Current password</label>
                {{ form.current() }}
            </div>
            <div class="field">
                <label>New password</label>
                {{ form.new() }}
            </div>
            <div class="field">
                <label>Confirm new password</label>
                {{ form.confirm() }}
            </div>
            <div class="form-actions">
                <a href="{{ url_for('account') }}" class="btn-text">Cancel</a>
                <button type="submit" class="btn-primary">Update</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
