{% extends "base.html" %}
{% block content %}
<div class="container section">
  <h1>{{ collection.name }}</h1>
  <p style="color:var(--c-gray-4)">A shared collection on Compass.</p>
  {% if listings %}
    <div class="grid-cards">
      {% for L in listings %}{% include "_card.html" %}{% endfor %}
    </div>
  {% else %}<div class="empty">This collection is empty.</div>{% endif %}
</div>
{% endblock %}
