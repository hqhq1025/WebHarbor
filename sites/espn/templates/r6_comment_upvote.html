{% extends "base.html" %}
{% block title %}Upvote Comment{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/article/{{ comment.article_slug }}/comment" class="back-link">← Comments</a>
    <h1>Upvote Comment</h1>
  </div>

  <section class="section-block">
    <p><strong>{{ comment.author_name }}:</strong> {{ comment.body }}</p>
    <p>Current upvotes: <strong>{{ comment.upvotes }}</strong></p>
    <form method="post" action="/comment/{{ comment.id }}/upvote" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="/article/{{ comment.article_slug }}/comment">
      <button class="btn-red" type="submit">Upvote</button>
    </form>
  </section>
</div>
{% endblock %}
