{% extends "base.html" %}
{% block title %}Join {{ pool.name }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/r5/bracket/{{ pool.bracket_slug }}" class="back-link">← {{ pool.bracket_slug }}</a>
    <h1>Join Pool: {{ pool.name }}</h1>
    <p class="subtitle">{{ pool.member_count }} members · scoring: {{ pool.scoring }}</p>
  </div>

  <section class="section-block">
    <form method="post" action="/bracket-pool/{{ pool.slug }}/join" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="display_name">Display name in pool</label>
        <input class="form-input" type="text" id="display_name" name="display_name" required maxlength="60">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="invite_code">Invite code</label>
        <input class="form-input" type="text" id="invite_code" name="invite_code" maxlength="20">
      </div>

      <button class="btn-red" type="submit">Join pool</button>
    </form>
  </section>
</div>
{% endblock %}
