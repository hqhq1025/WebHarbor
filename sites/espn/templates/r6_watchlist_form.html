{% extends "base.html" %}
{% block title %}Add to Watchlist{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/watch" class="back-link">← Watch</a>
    <h1>Add to Watchlist</h1>
    <p class="subtitle">Save a team, game, or show to come back to.</p>
  </div>

  <section class="section-block">
    <form method="post" action="/watchlist/add" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="kind">Type</label>
        <select class="form-input" id="kind" name="kind">
          <option value="team">Team</option>
          <option value="game">Game</option>
          <option value="show">Show / Series</option>
          <option value="player">Player</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="ref_slug">Slug or ID</label>
        <input class="form-input" type="text" id="ref_slug" name="ref_slug" required
               placeholder="e.g. boston-celtics or 12345">
      </div>
      <div class="form-group">
        <label class="form-label" for="label">Friendly label (optional)</label>
        <input class="form-input" type="text" id="label" name="label" maxlength="120">
      </div>

      <button class="btn-red" type="submit">Save to watchlist</button>
    </form>
  </section>
</div>
{% endblock %}
