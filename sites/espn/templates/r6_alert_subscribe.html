{% extends "base.html" %}
{% block title %}Subscribe to Live Game Alert{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1>Subscribe to Live Game Alerts</h1>
    <p class="subtitle">Get notified when a game tips off, ends, or goes overtime.</p>
  </div>

  <section class="section-block">
    <form method="post" action="/alert/subscribe" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="alert_kind">Alert type</label>
        <select class="form-input" id="alert_kind" name="alert_kind">
          <option value="game-start">Game start</option>
          <option value="game-end">Final score</option>
          <option value="overtime">Overtime</option>
          <option value="score-update">Score updates (every quarter)</option>
          <option value="injury">Injury news</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="ref_slug">Team or game slug</label>
        <input class="form-input" type="text" id="ref_slug" name="ref_slug" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="channel">Delivery</label>
        <select class="form-input" id="channel" name="channel">
          <option value="push">Push (ESPN app)</option>
          <option value="email">Email</option>
          <option value="sms">SMS</option>
        </select>
      </div>

      <button class="btn-red" type="submit">Turn on alert</button>
    </form>
  </section>
</div>
{% endblock %}
