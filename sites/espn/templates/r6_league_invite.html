{% extends "base.html" %}
{% block title %}Invite — {{ league.name }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/r4/fantasy/league/{{ league.slug }}" class="back-link">← {{ league.name }}</a>
    <h1>Invite a Manager</h1>
    <p class="subtitle">Send an invite to join {{ league.name }} ({{ league.sport_slug | upper }}).</p>
  </div>

  <section class="section-block">
    <form method="post" action="/fantasy/league/{{ league.slug }}/invite" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="recipient_email">Recipient email</label>
        <input class="form-input" type="email" id="recipient_email"
               name="recipient_email" required placeholder="friend@example.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="message">Personal note (optional)</label>
        <textarea class="form-input" id="message" name="message" rows="3"></textarea>
      </div>

      <button class="btn-red" type="submit">Send invite</button>
    </form>
  </section>
</div>
{% endblock %}
