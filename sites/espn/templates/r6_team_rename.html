{% extends "base.html" %}
{% block title %}Rename Team — {{ team.team_name }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/r4/fantasy/lineup/{{ team.slug }}" class="back-link">← {{ team.team_name }}</a>
    <h1>Rename Team</h1>
    <p class="subtitle">Manager {{ team.manager_name }}</p>
  </div>

  <section class="section-block">
    <form method="post" action="/fantasy/team/{{ team.slug }}/rename" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="team_name">New team name</label>
        <input class="form-input" type="text" id="team_name" name="team_name" required maxlength="60"
               value="{{ team.team_name }}">
      </div>
      <button class="btn-red" type="submit">Save new name</button>
    </form>
  </section>
</div>
{% endblock %}
