{% extends "base.html" %}
{% block title %}Join {{ league.name }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <a href="/r4/fantasy/league/{{ league.slug }}" class="back-link">← {{ league.name }}</a>
    <h1>Join {{ league.name }}</h1>
    <p class="subtitle">{{ league.sport_slug | upper }} · {{ league.scoring_type }} · {{ league.league_size }}-team</p>
  </div>

  <section class="section-block">
    <form method="post" action="/fantasy/league/{{ league.slug }}/join" class="r6-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="team_name">New team name</label>
        <input class="form-input" type="text" id="team_name" name="team_name" required maxlength="60">
      </div>
      <div class="form-group">
        <label class="form-label" for="manager_name">Manager name</label>
        <input class="form-input" type="text" id="manager_name" name="manager_name" required>
      </div>
      {% if not league.is_public %}
        <div class="form-group">
          <label class="form-label" for="invite_code">Invite code</label>
          <input class="form-input" type="text" id="invite_code" name="invite_code" required>
        </div>
      {% endif %}

      <button class="btn-red" type="submit">Join league</button>
    </form>
  </section>
</div>
{% endblock %}
