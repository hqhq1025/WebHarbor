<article class="product-card">
  <a class="product-art" href="{{ url_for('product_detail', slug=product.slug) }}">
    <img src="{{ url_for('product_art', slug=product.slug) }}" alt="{{ product.name }}">
  </a>
  <div class="product-body">
    <div class="eyebrow">{{ product.category.name }}</div>
    <h3><a href="{{ url_for('product_detail', slug=product.slug) }}">{{ product.name }}</a></h3>
    <p>{{ product.summary }}</p>
    <dl class="stat-row">
      <div><dt>Score</dt><dd>{{ product.score }}</dd></div>
      <div><dt>Price</dt><dd>${{ product.price }}</dd></div>
      <div><dt>Year</dt><dd>{{ product.release_year }}</dd></div>
    </dl>
  </div>
</article>
