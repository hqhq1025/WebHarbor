{% extends "base.html" %}
{% block title %}Change password | CarMax{% endblock %}
{% block content %}
<div class="container-tight" style="padding:40px 16px">
  <h1>Change password</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row"><label>Current password</label>{{ form.current_password() }}</div>
    <div class="form-row"><label>New password</label>{{ form.new_password() }}</div>
    <div class="form-row"><label>Confirm new password</label>{{ form.confirm() }}</div>
    <button class="btn btn-primary btn-block">Update password</button>
  </form>
</div>
{% endblock %}
