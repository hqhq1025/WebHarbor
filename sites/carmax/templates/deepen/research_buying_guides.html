{% extends "base.html" %}
{% block title %}Buying guides | CarMax Research{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <h1>Buying guides</h1>
    <p>{{ topics|length }} research articles to help you pick the right car.</p>
    <div class="dpn-info-grid">
      {% for t in topics %}
      <a class="dpn-info-card dpn-info-link" href="{{ url_for('research_topic', slug=t.slug) }}">
        <img loading="lazy" decoding="async" src="{{ t.hero_image }}" alt="{{ t.title }}"
             onerror="this.src='/static/images/_pending.svg'">
        <h3>{{ t.title }}</h3>
        <p>{{ t.summary }}</p>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
