{% extends "base.html" %}
{% block title %}{{ page.title }} | CarMax{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <p class="dpn-breadcrumb"><a href="/about">About CarMax</a></p>
    <h1>{{ page.title }}</h1>
    <p class="dpn-eyebrow">{{ page.eyebrow }}</p>
    <img src="/static/images/articles/how-carmax-works.jpg" alt="{{ page.title }}" class="dpn-about-hero">
    <article class="dpn-about-body">
      {% for para in page.body.split('\n\n') %}<p>{{ para }}</p>{% endfor %}
    </article>
  </div>
</section>
{% endblock %}
