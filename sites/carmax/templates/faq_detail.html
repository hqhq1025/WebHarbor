{% extends "base.html" %}
{% block title %}{{ question }} | CarMax FAQ{% endblock %}
{% block content %}
<div class="container-narrow" style="padding-top:24px">
  <div class="breadcrumbs"><a href="{{ url_for('faq_index') }}">FAQ</a> /
    <a href="{{ url_for('faq_category', category=category) }}">{{ category|replace('-', ' ')|capitalize }}</a></div>
  <h1>{{ question }}</h1>
  <p style="font-size:16px;line-height:1.7">{{ answer }}</p>
</div>
{% endblock %}
