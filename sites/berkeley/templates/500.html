{% extends "base.html" %}
{% block title %}Server Error — UC Berkeley{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 80px 20px;">
  <div style="font-size: 100px; margin-bottom: 20px; color: var(--blue);">500</div>
  <h1 style="color: var(--blue); font-size: 32px; margin-bottom: 16px;">Something Went Wrong</h1>
  <p style="font-family: Arial, sans-serif; font-size: 16px; color: var(--gray-mid); margin-bottom: 32px;">An unexpected error occurred. Please try again later.</p>
  <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
    <a href="{{ url_for('index') }}" class="btn btn-primary">Return to Homepage</a>
    <a href="{{ url_for('search') }}" class="btn btn-outline">Search Berkeley</a>
  </div>
</div>
{% endblock %}
