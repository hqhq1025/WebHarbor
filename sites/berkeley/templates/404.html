{% extends "base.html" %}
{% block title %}Page Not Found — UC Berkeley{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 80px 20px;">
  <div style="font-size: 100px; margin-bottom: 20px; color: var(--gold);">404</div>
  <h1 style="color: var(--blue); font-size: 32px; margin-bottom: 16px;">Page Not Found</h1>
  <p style="font-family: Arial, sans-serif; font-size: 16px; color: var(--gray-mid); margin-bottom: 32px;">The page you're looking for doesn't exist or has been moved.</p>
  <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Homepage</a>
    <a href="{{ url_for('search') }}" class="btn btn-outline">Search Berkeley</a>
    <a href="{{ url_for('programs') }}" class="btn btn-outline">Browse Programs</a>
  </div>
</div>
{% endblock %}
