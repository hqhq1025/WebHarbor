{% extends "base.html" %}
{% block title %}Start a quiz | Cambridge Dictionary Plus{% endblock %}
{% block content %}
<div class="container r11-quiz-start">
  <nav class="breadcrumb">
    <a href="{{ url_for('plus_index') }}">Plus</a> &raquo;
    <strong>Start a quiz</strong>
  </nav>
  <h1>Start a vocabulary quiz</h1>
  <p class="r11-blurb">Pick a difficulty and category — five questions per round. You can skip or restart at any time.</p>
  <form method="POST" action="{{ url_for('r11_quiz_start') }}" class="r11-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Difficulty
      <select name="difficulty">
        {% for d in difficulties %}<option value="{{ d }}">{{ d }}</option>{% endfor %}
      </select>
    </label>
    <label>Category
      <select name="category">
        {% for c in categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
    </label>
    <button type="submit" class="cta">Start quiz</button>
  </form>
</div>
{% endblock %}
