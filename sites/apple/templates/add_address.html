{% extends "base.html" %}
{% block title %}{% if address %}Edit{% else %}Add{% endif %} Address - Apple{% endblock %}

{% block content %}
<div style="max-width:600px;margin:0 auto;padding:80px 20px 60px">
    <a href="{{ url_for('saved_addresses') }}" style="font-size:14px;margin-bottom:16px;display:inline-block">&lsaquo; Back to Addresses</a>
    <h1 style="font-size:32px;font-weight:700;font-family:var(--font-family);margin-bottom:24px">
        {% if address %}Edit Address{% else %}Add New Address{% endif %}
    </h1>

    <form method="POST" action="{{ url_for('edit_address', addr_id=address.id) if address else url_for('add_address') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">

        <div class="form-group" style="margin-bottom:16px">
            <label style="font-weight:600;font-size:15px">Label</label>
            <select name="label" class="form-control" style="margin-top:6px">
                {% for lbl in ['Home', 'Work', 'Gift', 'Other'] %}
                <option value="{{ lbl }}" {{ 'selected' if address and address.label == lbl else '' }}>{{ lbl }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">First Name</label>
                <input type="text" name="first_name" class="form-control" style="margin-top:6px" required
                       value="{{ address.first_name if address else '' }}">
            </div>
            <div class="form-group" style="flex:1;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">Last Name</label>
                <input type="text" name="last_name" class="form-control" style="margin-top:6px" required
                       value="{{ address.last_name if address else '' }}">
            </div>
        </div>

        <div class="form-group" style="margin-bottom:16px">
            <label style="font-weight:600;font-size:15px">Street Address</label>
            <input type="text" name="address" class="form-control" style="margin-top:6px" required
                   value="{{ address.address if address else '' }}">
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">City</label>
                <input type="text" name="city" class="form-control" style="margin-top:6px" required
                       value="{{ address.city if address else '' }}">
            </div>
            <div class="form-group" style="flex:1;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">State</label>
                <input type="text" name="state" class="form-control" style="margin-top:6px" required
                       value="{{ address.state if address else '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;max-width:200px;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">ZIP Code</label>
                <input type="text" name="zip_code" class="form-control" style="margin-top:6px" required
                       value="{{ address.zip_code if address else '' }}">
            </div>
            <div class="form-group" style="flex:1;margin-bottom:16px">
                <label style="font-weight:600;font-size:15px">Phone (optional)</label>
                <input type="text" name="phone" class="form-control" style="margin-top:6px"
                       value="{{ address.phone if address else '' }}">
            </div>
        </div>

        <div class="form-group" style="margin-bottom:24px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                <input type="checkbox" name="is_default" value="1" {{ 'checked' if address and address.is_default else '' }}>
                <span style="font-size:15px">Set as default shipping address</span>
            </label>
        </div>

        <button type="submit" class="btn-checkout" style="max-width:240px">
            {% if address %}Update Address{% else %}Save Address{% endif %}
        </button>
    </form>
</div>
{% endblock %}
