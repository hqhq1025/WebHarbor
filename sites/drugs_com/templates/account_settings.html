{% extends "base.html" %}
{% block title %}Account Settings - Drugs.com{% endblock %}
{% block content %}
<nav class="breadcrumb">
  <a href="{{ url_for('index') }}">Home</a> &rsaquo;
  <a href="{{ url_for('account') }}">My Account</a> &rsaquo;
  <span>Settings</span>
</nav>

<h1>Account Settings</h1>

<nav class="account-tabs">
  <a href="{{ url_for('account') }}">My Account</a>
  <a href="{{ url_for('my_med_list') }}">My Med List</a>
  <a href="/account/reviews">My Reviews</a>
  <a href="/account/settings" class="active">Settings</a>
  <a href="/account/settings">Subscriptions</a>
</nav>

<form onsubmit="event.preventDefault();alert('Settings saved (demo).')" class="account-box" style="max-width:640px">
  <h2>Profile Information</h2>
  <div style="margin-bottom:14px">
    <label style="display:block;font-weight:600;margin-bottom:6px">Username</label>
    <input type="text" name="username" value="{{ current_user.username }}" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:4px">
  </div>
  <div style="margin-bottom:14px">
    <label style="display:block;font-weight:600;margin-bottom:6px">Email address</label>
    <input type="email" name="email" value="{{ current_user.email }}" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:4px">
  </div>
  <div style="margin-bottom:14px">
    <label style="display:block;font-weight:600;margin-bottom:6px">New password</label>
    <input type="password" name="password" placeholder="Leave blank to keep current password" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:4px">
  </div>

  <h2 style="margin-top:24px">Email Preferences</h2>
  <label style="display:block;margin-bottom:8px"><input type="checkbox" checked> Weekly drug news digest</label>
  <label style="display:block;margin-bottom:8px"><input type="checkbox" checked> FDA safety alerts</label>
  <label style="display:block;margin-bottom:8px"><input type="checkbox"> New approval notifications</label>
  <label style="display:block;margin-bottom:8px"><input type="checkbox"> Product offers from partners</label>

  <h2 style="margin-top:24px">Privacy</h2>
  <label style="display:block;margin-bottom:8px"><input type="checkbox" checked> Show my reviews publicly</label>
  <label style="display:block;margin-bottom:8px"><input type="checkbox"> Allow personalized recommendations</label>

  <div style="margin-top:24px;display:flex;gap:12px">
    <button type="submit" class="btn">Save changes</button>
    <a href="{{ url_for('account') }}" class="btn btn-outline">Cancel</a>
  </div>
</form>
{% endblock %}
