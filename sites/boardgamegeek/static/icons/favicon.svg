<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- BoardGameGeek favicon: brown wooden d6 with white pips -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5a2b"/>
      <stop offset="1" stop-color="#5b3a1a"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="8" ry="8" fill="url(#g)" stroke="#3a2410" stroke-width="2"/>
  <!-- Five pips (face of a die showing 5) -->
  <circle cx="20" cy="20" r="4" fill="#fdf6e3"/>
  <circle cx="44" cy="20" r="4" fill="#fdf6e3"/>
  <circle cx="32" cy="32" r="4" fill="#fdf6e3"/>
  <circle cx="20" cy="44" r="4" fill="#fdf6e3"/>
  <circle cx="44" cy="44" r="4" fill="#fdf6e3"/>
</svg>
