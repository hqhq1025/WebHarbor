{% extends "base.html" %}
{% block title %}New GeekList | {{ site_name }}{% endblock %}
{% block content %}
<div class="page single">
  <div class="main">
    <h1>New GeekList</h1>
    <form method="post">
      {{ form.hidden_tag() }}
      <div class="field">{{ form.title.label }}{{ form.title() }}</div>
      <div class="field">{{ form.description.label }}{{ form.description() }}</div>
      <div class="btn-row">
        <button type="submit">Create list</button>
        <a class="btn btn-quiet" href="{{ url_for('geeklists_index') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
