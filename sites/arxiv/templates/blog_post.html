{% extends "base.html" %}
{% block title %}{{ post.title }} — arXiv Blog{% endblock %}
{% block content %}

<p><a href="{{ url_for('blog') }}">← Back to blog</a></p>
<div class="muted">{{ post.date }} · by {{ post.author }}</div>
<h1>{{ post.title }}</h1>

<div class="dash-card">
    <p>{{ post.body }}</p>
</div>

{% endblock %}
