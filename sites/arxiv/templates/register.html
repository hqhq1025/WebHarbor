{% extends "base.html" %}
{% block title %}Register — arXiv{% endblock %}
{% block content %}

<div class="auth-card">
    <h1>Create an arXiv account</h1>
    <p class="muted">Registering lets you save papers, subscribe to alerts, and submit articles.</p>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-row">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <p class="form-hint">Your public display name on arXiv.</p>
        </div>
        <div class="form-row">
            <label for="full_name">Full name</label>
            <input type="text" id="full_name" name="full_name">
        </div>
        <div class="form-row">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
            <p class="form-hint">At least 6 characters.</p>
        </div>
        <div class="form-row">
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Account</button>
            <a href="{{ url_for('login') }}">Already have an account?</a>
        </div>
    </form>
</div>

{% endblock %}
