{% extends "base.html" %}
{% block title %}Edit Profile — arXiv{% endblock %}
{% block content %}

<h1>Edit Profile</h1>

<div class="auth-card" style="max-width:540px;">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <label for="full_name">Full name</label>
            <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name }}">
        </div>
        <div class="form-row">
            <label for="affiliation">Affiliation</label>
            <input type="text" id="affiliation" name="affiliation" value="{{ current_user.affiliation }}">
            <p class="form-hint">Your university, lab, or employer.</p>
        </div>
        <div class="form-row">
            <label for="orcid">ORCID</label>
            <input type="text" id="orcid" name="orcid" value="{{ current_user.orcid }}" placeholder="0000-0000-0000-0000">
        </div>
        <div class="form-row">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4">{{ current_user.bio }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('account') }}" class="btn">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
