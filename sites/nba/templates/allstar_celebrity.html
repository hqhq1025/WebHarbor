{% extends "base.html" %}
{% block title %}{{ year }} Celebrity All-Star Game{% endblock %}
{% block content %}
<section class="allstar-deep">
  <header class="allstar-hero">
    <h1>{{ year }} Celebrity All-Star Game</h1>
    <nav class="allstar-tabs">
      <a href="{{ url_for('allstar_year', year=year) }}">Overview</a>
      <a href="{{ url_for('allstar_voting', year=year) }}">Vote</a>
      <a class="active" href="{{ url_for('allstar_celebrity_game', year=year) }}">Celebrity Game</a>
    </nav>
  </header>
  <div class="celeb-grid">
    {% for c in celebs %}
    <article class="celeb-card">
      <img loading="lazy" decoding="async" src="{{ c.image }}" alt="">
      <h3>{{ c.name }}</h3>
      <small>{{ c.team }} · {{ c.role }}</small>
      <p>{{ c.tagline }}</p>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
