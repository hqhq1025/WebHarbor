<div class="filter-bar">
  {% if title %}<strong>{{ title }}</strong>{% endif %}
  {% if links %}
    <div class="filter-links">
      {% for link in links %}
        <a class="{% if link.active %}active{% endif %}" href="{{ link.href }}">{{ link.label }}</a>
      {% endfor %}
    </div>
  {% endif %}
</div>
