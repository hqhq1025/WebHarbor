<article class="team-card" style="--team: {{ team.color }}">
  <a class="team-main" href="{{ url_for('team_detail', slug=team.slug) }}">
    <img loading="lazy" decoding="async" src="{{ team.logo }}" alt="">
    <strong>{{ team.full_name }}</strong>
    <span>{{ team.conference }} · {{ team.division }}</span>
  </a>
  <div class="quick-links">
    <a href="{{ url_for('team_detail', slug=team.slug) }}">Profile</a>
    <a href="{{ url_for('team_stats_detail', slug=team.slug) }}">Stats</a>
    <a href="{{ url_for('team_schedule', slug=team.slug) }}">Schedule</a>
    <a href="{{ url_for('team_roster', slug=team.slug) }}">Roster</a>
    <a href="{{ url_for('tickets', team=team.slug) }}">Tickets</a>
  </div>
</article>
