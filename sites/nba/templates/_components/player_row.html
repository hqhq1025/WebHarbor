<tr>
  <td>
    <a class="player-cell" href="{{ url_for('player_detail', slug=player.slug) }}">
      <img src="{{ player.image }}" alt="">
      <span>{{ player.name }}</span>
    </a>
  </td>
  <td><a href="{{ url_for('team_detail', slug=player.team.slug) }}">{{ player.team.abbreviation }}</a></td>
  <td>{{ player.jersey }}</td>
  <td>{{ player.position }}</td>
  <td>{{ player.height }}</td>
  <td>{{ player.weight }}</td>
  <td>{{ player.college }}</td>
  <td>{{ player.country }}</td>
</tr>
