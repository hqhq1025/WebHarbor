{% extends "base.html" %}
{% block title %}Sign in - BBC News{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Sign in to BBC News</h1>
    <p class="auth-sub">Access your reading list, bookmarks, and topic alerts.</p>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-full">Sign in</button>
    </form>
    <div class="auth-footer">
        New to BBC News? <a href="{{ url_for('register') }}">Create an account</a>
    </div>
    <div class="auth-footer" style="margin-top: 8px; font-size: 12px;">
        Demo login: demo@bbcnews.local / demodemo
    </div>
</div>
{% endblock %}
