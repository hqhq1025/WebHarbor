{% extends "base.html" %}
{% block title %}Register - BBC News{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Create a BBC News account</h1>
    <p class="auth-sub">Personalise your news, save stories, and manage email alerts.</p>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="full_name">Full name</label>
            <input type="text" name="full_name" id="full_name">
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-full">Create account</button>
    </form>
    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
