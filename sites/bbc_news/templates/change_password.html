{% extends "base.html" %}
{% block title %}Change password - BBC News{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Change your password</h1>
    <p class="auth-sub">Choose a new password at least 6 characters long.</p>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="current_password">Current password</label>
            <input type="password" name="current_password" id="current_password" required autocomplete="current-password">
        </div>
        <div class="form-group">
            <label for="new_password">New password</label>
            <input type="password" name="new_password" id="new_password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm new password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-full">Update password</button>
    </form>
    <div class="auth-footer">
        <a href="{{ url_for('account') }}">← Back to account</a>
    </div>
</div>
{% endblock %}
