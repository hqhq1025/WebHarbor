{% extends "base.html" %}
{% block title %}new thread - {{ board.name }} forum{% endblock %}
{% block content %}
<div class="content-shell forums-shell">
  <nav class="breadcrumb"><a href="{{ url_for('discussion_forums') }}">discussion forums</a> &gt; <a href="{{ url_for('forum_board', slug=board.slug) }}">{{ board.name }}</a> &gt; <span>new thread</span></nav>
  <h1>new thread in {{ board.name }}</h1>
  <p class="muted">{{ board.description }}</p>
  <form method="post" class="new-thread-form">
    {% if not current_user.is_authenticated %}
    <label>your name</label><input name="name" placeholder="your name">
    <label>your email</label><input name="email" placeholder="reply address">
    {% endif %}
    <label>thread title</label>
    <input name="title" required>
    <label>body</label>
    <textarea name="body" rows="8" required></textarea>
    <button type="submit">post thread</button>
  </form>
</div>
{% endblock %}
