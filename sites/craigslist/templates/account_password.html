{% extends "base.html" %}
{% block title %}change password - craigslist{% endblock %}
{% block content %}
<div class="content-shell form-page">
  <p class="form-back"><a href="{{ url_for('account') }}">&lt; account</a></p>
  <h1>change password</h1>
  <form method="post" class="password-form">
    <label>current password</label>
    <input type="password" name="current_password" required>
    <label>new password</label>
    <input type="password" name="new_password" required>
    <label>confirm new password</label>
    <input type="password" name="confirm_password" required>
    <button type="submit">update password</button>
  </form>
  <p class="muted">password is stored as a salted hash. craigslist will never ask for your password by email.</p>
</div>
{% endblock %}
