{% extends "base.html" %}
{% block title %}Change password - Google Maps{% endblock %}

{% block body %}
<div class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
        <span class="brand-ico"><span class="material-icons-outlined" style="font-size:26px;color:#ea4335;">place</span></span>
        <span>Google Maps</span>
    </a>
    <div class="nav-links">
        <a href="{{ url_for('account') }}" class="nav-link">Back to account</a>
    </div>
</div>

<div class="page narrow">
    <h1>Change password</h1>
    <p class="page-sub">Choose a strong, unique password you don't use elsewhere.</p>

    <form method="POST" style="background:#fff; padding:24px; border:1px solid var(--divider); border-radius:12px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Current password</label>
            <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
            <label>New password</label>
            <input type="password" name="new_password" required minlength="6">
            <div class="hint">At least 6 characters</div>
        </div>
        <div class="form-group">
            <label>Confirm new password</label>
            <input type="password" name="new_password2" required>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn">Update password</button>
            <a href="{{ url_for('account') }}" class="btn outlined">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
