<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Google Maps{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined|Material+Icons" rel="stylesheet">
    <style>
        .material-icons-outlined, .material-icons {
            font-family: 'Material Icons Outlined', 'Material Icons';
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'liga';
        }
        /* R5 additions: screen-reader-only utility + map type/layer pickers + high contrast. */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            white-space: nowrap; border: 0;
        }
        .main-map.high-contrast .map-canvas {
            filter: contrast(1.4) saturate(0.7) brightness(0.95);
        }
        .map-typeswitch {
            position: absolute; left: 16px; bottom: 16px;
            display: flex; gap: 4px; background: #fff;
            border: 1px solid #dadce0; border-radius: 24px;
            padding: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            z-index: 5;
        }
        .map-type-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; border: 0; background: transparent;
            border-radius: 20px; cursor: pointer; color: #5f6368;
            font-size: 13px; font-weight: 500;
        }
        .map-type-btn.active { background: #e8f0fe; color: #1a73e8; }
        .map-type-btn .material-icons-outlined { font-size: 16px; }
        .map-layers {
            position: absolute; right: 16px; bottom: 16px;
            display: flex; flex-direction: column; gap: 6px; z-index: 5;
        }
        .layer-toggle {
            background: #fff; border: 1px solid #dadce0;
            border-radius: 8px; padding: 6px 10px;
            display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer; font-size: 12px; color: #202124;
            min-width: 96px;
        }
        .layer-toggle[aria-pressed="true"] {
            background: #e8f0fe; border-color: #1a73e8; color: #1a73e8;
        }
        .layer-toggle .material-icons-outlined { font-size: 16px; }
        .pd-ambient-chip { white-space: nowrap; }
        .floor-strip { scrollbar-width: thin; }
        .floor-strip-btn.selected { box-shadow: 0 0 0 2px #1a73e8 inset; }
        /* Mobile: show bottom-sheet handle */
        @media (max-width: 720px) {
            .pd-bottom-sheet-handle { display: block !important; }
            .map-typeswitch { bottom: 80px; }
            .map-layers { bottom: 80px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        <span>{{ message }}</span>
                        <button class="flash-close" aria-label="Dismiss">&times;</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
