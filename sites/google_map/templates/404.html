{% extends "base.html" %}
{% block title %}Page not found - Google Maps{% endblock %}

{% block body %}
<div class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
        <span class="material-icons-outlined" style="font-size:26px;color:#ea4335;">place</span>
        <span>Google Maps</span>
    </a>
</div>

<div class="page narrow" style="text-align:center; padding-top:80px;">
    <div style="font-size:120px; color:var(--blue); font-weight:300; line-height:1;">404</div>
    <h1 style="margin-top:12px;">We can't find that place</h1>
    <p class="page-sub" style="margin-bottom:28px;">The page you're looking for may have moved or never existed.</p>
    <div style="display:flex; gap:12px; justify-content:center;">
        <a href="{{ url_for('index') }}" class="btn">Back to map</a>
        <a href="{{ url_for('explore') }}" class="btn outlined">Explore places</a>
    </div>
</div>
{% endblock %}
