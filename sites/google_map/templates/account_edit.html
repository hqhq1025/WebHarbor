{% extends "base.html" %}
{% block title %}Edit profile - Google Maps{% endblock %}

{% block body %}
<div class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
        <span class="brand-ico"><span class="material-icons-outlined" style="font-size:26px;color:#ea4335;">place</span></span>
        <span>Google Maps</span>
    </a>
    <div class="nav-links">
        <a href="{{ url_for('account') }}" class="nav-link">Back to account</a>
    </div>
</div>

<div class="page narrow">
    <h1>Edit profile</h1>
    <p class="page-sub">Update your name, location, and bio.</p>

    <form method="POST" style="background:#fff; padding:24px; border:1px solid var(--divider); border-radius:12px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Full name</label>
            <input type="text" name="name" value="{{ current_user.name }}" required>
        </div>
        <div class="form-group">
            <label>Home city</label>
            <input type="text" name="home_city" value="{{ current_user.home_city }}" placeholder="e.g. San Francisco">
        </div>
        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="4" placeholder="Tell people a bit about yourself...">{{ current_user.bio }}</textarea>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn">Save changes</button>
            <a href="{{ url_for('account') }}" class="btn outlined">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
