{% extends "base.html" %}
{% block title %}Sign in - Google Maps{% endblock %}

{% block body %}
<div class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
        <span class="brand-ico"><span class="material-icons-outlined" style="font-size:26px;color:#ea4335;">place</span></span>
        <span>
            <span class="letter g1">G</span><span class="letter o1">o</span><span class="letter o2">o</span><span class="letter g2">g</span><span class="letter l">l</span><span class="letter e">e</span> Maps
        </span>
    </a>
</div>

<div class="form-wrap">
    <h1>Sign in</h1>
    <p style="text-align:center; color:var(--text-secondary); margin-bottom:24px; font-size:14px;">
        to continue to Google Maps
    </p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">Sign in</button>
    </form>
    <div style="text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary);">
        Don't have an account?
        <a href="{{ url_for('register') }}">Create one</a>
    </div>
</div>

<div class="app-footer">
    <div class="footer-links">
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('help_page') }}">Help</a>
    </div>
    <div>&copy; {{ current_year }} Google Maps Mirror</div>
</div>
{% endblock %}
