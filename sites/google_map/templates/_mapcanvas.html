<section class="main-map">
    <div class="map-canvas">
        <div class="map-label" style="top: 22%; left: 26%;">North</div>
        <div class="map-label" style="top: 46%; left: 60%;">Downtown</div>
        <div class="map-label" style="top: 72%; left: 20%;">Riverfront</div>
        <div class="map-label" style="top: 30%; left: 70%;">East District</div>
        {% block map_pins %}
            {% for p in (featured or popular or places or [])[:10] %}
                <div class="map-pin" style="top: {{ 25 + loop.index0 * 7 }}%; left: {{ 30 + (loop.index0 * 6) % 50 }}%;">
                    <div class="pin-head {% if loop.index0 % 5 == 0 %}blue{% elif loop.index0 % 5 == 1 %}green{% elif loop.index0 % 5 == 2 %}yellow{% elif loop.index0 % 5 == 3 %}purple{% endif %}"></div>
                    <div class="pin-label">{{ p.name }}</div>
                </div>
            {% endfor %}
        {% endblock %}
    </div>

    <div class="map-account">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('account') }}" class="avatar">{{ current_user.avatar_letter }}</a>
        {% else %}
            <button class="apps-grid-btn" title="Google apps"><span class="material-icons-outlined">apps</span></button>
            <a href="{{ url_for('login') }}" class="sign-in-btn">Sign in</a>
        {% endif %}
    </div>

    <div class="map-controls">
        <div class="map-ctrl-group">
            <button class="map-ctrl-btn" title="Zoom in">+</button>
            <button class="map-ctrl-btn" title="Zoom out">−</button>
        </div>
        <div class="map-ctrl-group">
            <button class="map-ctrl-btn" title="My location"><span class="material-icons-outlined">my_location</span></button>
        </div>
    </div>

    <div class="map-layers">
        <div class="layer-icon"></div>
        <span>Layers</span>
    </div>
</section>
