{% extends "base.html" %}
{% block title %}Create account - Google Maps{% endblock %}

{% block body %}
<div class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
        <span class="brand-ico"><span class="material-icons-outlined" style="font-size:26px;color:#ea4335;">place</span></span>
        <span>
            <span class="letter g1">G</span><span class="letter o1">o</span><span class="letter o2">o</span><span class="letter g2">g</span><span class="letter l">l</span><span class="letter e">e</span> Maps
        </span>
    </a>
</div>

<div class="form-wrap">
    <h1>Create account</h1>
    <p style="text-align:center; color:var(--text-secondary); margin-bottom:24px; font-size:14px;">
        Save places, write reviews, plan trips
    </p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Full name</label>
            <input type="text" name="name" required autofocus>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6">
            <div class="hint">At least 6 characters</div>
        </div>
        <div class="form-group">
            <label>Confirm password</label>
            <input type="password" name="password2" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">Create account</button>
    </form>
    <div style="text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary);">
        Already have an account?
        <a href="{{ url_for('login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
