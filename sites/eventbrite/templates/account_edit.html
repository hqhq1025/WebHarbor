{% extends "base.html" %}
{% block title %}Edit profile | Eventbrite{% endblock %}
{% block content %}
<div class="eb-container eb-page" style="max-width:560px;">
  <h1 class="eb-h1">Edit profile</h1>
  <form method="POST">
    <div class="eb-form-row"><label>Email</label><input type="email" value="{{ current_user.email }}" disabled></div>
    <div class="eb-form-row"><label>Full name</label><input type="text" name="name" value="{{ current_user.name }}" required></div>
    <div class="eb-form-row"><label>Phone</label><input type="tel" name="phone" value="{{ current_user.phone }}"></div>
    <div class="eb-form-row"><label>City</label>
      <input type="text" name="city" value="{{ current_user.city }}">
    </div>
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline" href="{{ url_for('account') }}">Cancel</a>
  </form>
</div>
{% endblock %}
