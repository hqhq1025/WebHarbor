{% extends "base.html" %}
{% block title %}Log in | Eventbrite{% endblock %}
{% block content %}
<div class="eb-container eb-page" style="max-width:420px;">
  <h1 class="eb-h1">Log in</h1>
  <p class="eb-muted">Welcome back. Enter your details to continue.</p>
  {% if error %}<div class="eb-flash error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="eb-form-row"><label>Email</label><input type="email" name="email" required autofocus></div>
    <div class="eb-form-row"><label>Password</label><input type="password" name="password" required></div>
    <button class="btn btn-primary btn-block btn-large" type="submit">Log in</button>
  </form>
  <p class="eb-muted" style="margin-top:18px;">No account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</div>
{% endblock %}
