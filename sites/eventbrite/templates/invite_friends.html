{% extends "base.html" %}
{% block title %}Invite friends to {{ ev.title }} | Eventbrite{% endblock %}
{% block content %}
<div class="eb-container eb-page" style="max-width:640px;">
  {% include 'partials/breadcrumbs.html' with context %}
  <h1 class="eb-h1">Invite friends</h1>
  <p class="eb-muted">{{ ev.title }} · {{ fmt_dt(ev.start_dt) }}</p>
  <form method="POST" action="{{ url_for('invite_friends', slug=ev.slug) }}">
    <label>Friends' emails (comma-separated, up to 20)
      <textarea name="emails" rows="3" required placeholder="alice@example.com, bob@example.com" style="width:100%;padding:10px;border:1px solid var(--eb-border);border-radius:4px;margin-top:6px;"></textarea>
    </label>
    <label style="display:block;margin-top:14px;">Personal note (optional)
      <textarea name="message" rows="3" placeholder="You're going to love this one!" style="width:100%;padding:10px;border:1px solid var(--eb-border);border-radius:4px;margin-top:6px;"></textarea>
    </label>
    <button class="btn btn-primary" type="submit" style="margin-top:18px;">Send invites</button>
  </form>
</div>
{% endblock %}
