<article class="sim-card">
  <a class="sim-thumb" href="{{ url_for('simulation_detail', slug=sim.slug) }}">
    {% if sim.slug in available_thumbnails %}
      <img src="{{ url_for('static', filename='images/sims/' ~ sim.slug ~ '.png') }}"
           alt="{{ sim.title }}" loading="lazy">
    {% else %}
      <span class="sim-thumb-placeholder">{{ sim.title }}</span>
    {% endif %}
    {% if sim.is_html5 %}<span class="sim-type-badge" title="HTML5">H5</span>{% endif %}
  </a>
  <div class="sim-meta">
    <h3 class="sim-title">
      <a href="{{ url_for('simulation_detail', slug=sim.slug) }}">{{ sim.title }}</a>
    </h3>
    {% set lang_count = sim.languages()|length %}
    {% if lang_count %}
      <div class="lang-dots" aria-label="{{ lang_count }} translations">
        {% for i in range(8) %}
          {% if i < lang_count %}<span class="lang-dot"></span>{% else %}<span class="lang-dot muted"></span>{% endif %}
        {% endfor %}
      </div>
    {% endif %}
  </div>
</article>
