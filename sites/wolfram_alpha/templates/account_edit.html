{% extends "base.html" %}
{% block title %}Edit Profile — Wolfram|Alpha{% endblock %}

{% block content %}
<div class="section-inner auth-page">
  <div class="auth-card auth-card--wide">
    <h1 class="auth-title">Edit Profile</h1>
    <form class="auth-form" method="post" action="/account/edit">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input"
               value="{{ current_user.email }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-input"
               value="{{ current_user.full_name }}">
      </div>
      <div class="form-group">
        <label class="form-label">Institution / Organization</label>
        <input type="text" name="institution" class="form-input"
               value="{{ current_user.institution }}"
               placeholder="University, company, or school">
      </div>
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-input" rows="3"
                  placeholder="Tell us about yourself...">{{ current_user.bio }}</textarea>
      </div>
      <div class="form-row">
        <button type="submit" class="btn btn-pro-primary">Save Changes</button>
        <a href="/account" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
