{% extends "base.html" %}
{% block title %}Create Account — Wolfram|Alpha{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-text">Wolfram|<span class="alpha">Alpha</span></span>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Free forever. Upgrade to Pro anytime.</p>

    <form class="auth-form" method="post" action="/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="you@example.com" required autofocus>
      </div>

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input"
               placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label for="confirm" class="form-label">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" class="form-input"
               placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn btn-pro-primary btn-full btn-lg">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="/login" class="auth-link">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
