{% extends "base.html" %}
{% block title %}Change Password — Wolfram|Alpha{% endblock %}

{% block content %}
<div class="section-inner auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Change Password</h1>
    <form class="auth-form" method="post" action="/account/password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" name="current_password" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-input"
               placeholder="At least 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-input" required>
      </div>
      <div class="form-row">
        <button type="submit" class="btn btn-pro-primary">Update Password</button>
        <a href="/account" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
