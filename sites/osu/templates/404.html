{% extends "base.html" %}
{% block title %}Page Not Found — Ohio State{% endblock %}
{% block content %}
<div style="text-align:center;padding:80px 20px">
  <div style="font-size:80px;font-weight:bold;color:var(--scarlet);font-family:sans-serif">404</div>
  <h1 style="font-size:28px;margin-bottom:12px;color:var(--scarlet)">Page Not Found</h1>
  <p style="font-size:16px;color:var(--gray);max-width:400px;margin:0 auto 30px;line-height:1.6">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Homepage</a>
    <a href="{{ url_for('search') }}" class="btn btn-outline">Search the Site</a>
  </div>
</div>
{% endblock %}
