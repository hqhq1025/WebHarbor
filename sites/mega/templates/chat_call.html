{% extends "base.html" %}
{% block title %}Start call — {{ thread.name }}{% endblock %}
{% block content %}
<section class="page-head"><h1>Start a call in {{ thread.name }}</h1></section>
<form class="form-card" method="post">
  <label>Call type</label>
  <select name="call_kind">
    <option value="voice">Voice call</option>
    <option value="video">Video call</option>
  </select>
  <button type="submit">Start</button>
  <a class="button ghost" href="{{ url_for('chat_thread', slug=thread.slug) }}">Cancel</a>
</form>
{% endblock %}
