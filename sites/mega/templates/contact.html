{% extends "base.html" %}
{% block title %}Contact MEGA{% endblock %}
{% block content %}
<section class="page-head"><h1>We’re here to help</h1><p>Make an enquiry or report an issue.</p></section>
<form class="form-card wide" method="post">
  <label>Category <select name="category"><option>Cloud drive</option><option>Billing</option><option>Business</option><option>Object storage</option><option>Pass</option><option>VPN</option></select></label>
  <label>Priority <select name="priority"><option>Normal</option><option>High</option><option>Urgent</option></select></label>
  <label>Subject <input name="subject" required></label>
  <label>Message <textarea name="message" required></textarea></label>
  <button type="submit">Submit ticket</button>
</form>
{% endblock %}
