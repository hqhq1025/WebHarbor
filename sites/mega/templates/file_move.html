{% extends "base.html" %}
{% block title %}Move {{ item.name }}{% endblock %}
{% block content %}
<section class="page-head"><h1>Move file</h1><p>Currently in <strong>{{ item.folder }}</strong>.</p></section>
<form class="form-card" method="post">
  <label>Destination folder</label>
  <select name="folder">
    {% for f in folders %}<option value="{{ f }}" {% if f == item.folder %}selected{% endif %}>{{ f }}</option>{% endfor %}
  </select>
  <button type="submit">Move file</button>
  <a class="button ghost" href="{{ url_for('file_detail', slug=item.slug) }}">Cancel</a>
</form>
{% endblock %}
