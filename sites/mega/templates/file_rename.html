{% extends "base.html" %}
{% block title %}Rename {{ item.name }}{% endblock %}
{% block content %}
<section class="page-head"><h1>Rename file</h1><p>{{ item.folder }} / {{ item.name }}</p></section>
<form class="form-card" method="post">
  <label>New name</label>
  <input name="name" value="{{ item.name }}" required>
  <div class="row">
    <button type="submit">Save rename</button>
    <a class="button ghost" href="{{ url_for('file_detail', slug=item.slug) }}">Cancel</a>
  </div>
</form>
{% endblock %}
