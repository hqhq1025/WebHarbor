{% extends 'base.html' %}
{% block title %}Preferences — Phys.org{% endblock %}
{% block content %}
<article>
  <h1>Newsletter & alert preferences</h1>
  <form method="post" action="/myaccount/preferences">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <fieldset><legend>Digests</legend>
      <label><input type="checkbox" name="daily_digest" {{ 'checked' if prefs and prefs.daily_digest else '' }}> Daily digest</label><br>
      <label><input type="checkbox" name="weekly_digest" {{ 'checked' if prefs and prefs.weekly_digest else '' }}> Weekly research roundup</label><br>
      <label><input type="checkbox" name="breaking_alerts" {{ 'checked' if prefs and prefs.breaking_alerts else '' }}> Breaking-news alerts</label>
    </fieldset>
    <fieldset style="margin-top:14px;"><legend>Preferred categories</legend>
      {% for c in all_categories %}
        <label style="display:inline-block;margin:4px 12px 4px 0;">
          <input type="checkbox" name="preferred_categories" value="{{ c.slug }}"
                 {{ 'checked' if prefs and c.slug in prefs.preferred_categories.split(',') else '' }}> {{ c.name }}
        </label>
      {% endfor %}
    </fieldset>
    <button class="btn" type="submit" style="margin-top:14px;">Save preferences</button>
  </form>
</article>
{% endblock %}
