{% extends 'base.html' %}
{% block title %}Topics — Phys.org{% endblock %}
{% block content %}
<h1>Phys.org Topics</h1>
<p class="lede">Browse the long-running threads our newsroom keeps tracking.</p>
<div class="topic-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;">
  {% for slug, label, cat in topics %}
    <a href="/topic/{{ slug }}" class="topic-card" style="display:block;padding:16px;border:1px solid #ddd;border-radius:6px;text-decoration:none;color:inherit;">
      <div style="font-weight:700;font-size:16px;">{{ label }}</div>
      <div class="text-muted" style="font-size:13px;">in {{ cat }}</div>
    </a>
  {% endfor %}
</div>
{% endblock %}
