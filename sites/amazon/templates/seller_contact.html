{% extends "base.html" %}
{% block title %}Contact {{ seller.brand }}{% endblock %}
{% block content %}
<div class="account-page" style="max-width:600px">
    <h1>Contact {{ seller.brand }}</h1>
    {% if sent %}
        <p style="color:green">Message sent — typical response time is {{ seller.response_time_hours }} hours.</p>
    {% endif %}
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">
        <input type="text" name="subject" class="form-control" placeholder="Subject" required>
        <textarea name="body" rows="5" class="form-control" placeholder="Describe your issue..." required></textarea>
        <button class="btn-primary" type="submit">Send message</button>
    </form>
</div>
{% endblock %}
