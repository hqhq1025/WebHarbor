{% extends "base.html" %}
{% block title %}Edit Profile - Amazon.com{% endblock %}

{% block content %}
<div class="account-page" style="max-width:600px">
    <h1>Edit your profile</h1>
    <div style="background:#fff;padding:20px;border-radius:4px">
        <form method="POST" novalidate>
            {{ form.csrf_token }}
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ form.name.data or '' }}" required>
            </div>
            <div class="form-group">
                <label for="phone">Mobile Phone</label>
                <input type="text" id="phone" name="phone" class="form-control" value="{{ form.phone.data or '' }}">
            </div>
            <div class="form-group">
                <label for="address_line1">Address Line 1</label>
                <input type="text" id="address_line1" name="address_line1" class="form-control" value="{{ form.address_line1.data or '' }}">
            </div>
            <div class="form-group">
                <label for="address_line2">Address Line 2</label>
                <input type="text" id="address_line2" name="address_line2" class="form-control" value="{{ form.address_line2.data or '' }}">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" class="form-control" value="{{ form.city.data or '' }}">
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" class="form-control" value="{{ form.state.data or '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="zip_code">ZIP Code</label>
                    <input type="text" id="zip_code" name="zip_code" class="form-control" value="{{ form.zip_code.data or '' }}">
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" class="form-control" value="{{ form.country.data or 'United States' }}">
                </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px">
                <button type="submit" class="btn btn-orange">Save Changes</button>
                <a href="{{ url_for('account') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
