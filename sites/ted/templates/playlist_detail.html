{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <p class="eyebrow">Playlist</p>
  <h1>{{ playlist.title }}</h1>
  <p>{{ playlist.description }}</p>
</section>
<section class="band">
  <div class="grid">
    {% for link in links %}
      {% set talk = link.talk %}
      {% include "_talk_card.html" %}
    {% endfor %}
  </div>
</section>
{% endblock %}
