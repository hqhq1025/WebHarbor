{% extends "base.html" %}
{% block title %}Saved talks | TED account{% endblock %}
{% block content %}
<section class="page-head">
  <p class="eyebrow">Your library</p>
  <h1>Saved talks</h1>
  <p>{{ saved|length }} talks saved for later.</p>
</section>
<section class="band">
  <div class="list">
    {% for s in saved %}
      <div class="row-link">
        <a href="{{ url_for('talk_detail', slug=s.talk.slug) }}"><strong>{{ s.talk.title }}</strong><span>{{ s.note }}</span></a>
        <form method="post" action="{{ url_for('unsave_talk', saved_id=s.id) }}"><button type="submit">Remove</button></form>
      </div>
    {% else %}
      <p>You have no saved talks yet.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
