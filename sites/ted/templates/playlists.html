{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <p class="eyebrow">Watch</p>
  <h1>Playlists</h1>
</section>
<section class="topic-grid">
  {% for playlist in playlists %}
    <a href="{{ url_for('playlist_detail', slug=playlist.slug) }}"><strong>{{ playlist.title }}</strong><span>{{ playlist.description }}</span></a>
  {% endfor %}
</section>
{% endblock %}
