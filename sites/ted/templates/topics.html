{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <p class="eyebrow">Discover</p>
  <h1>Topics</h1>
</section>
<section class="topic-grid">
  {% for topic, count in counts %}
    <a href="{{ url_for('topic_detail', topic=topic) }}"><strong>{{ topic }}</strong><span>{{ count }} talks</span></a>
  {% endfor %}
</section>
{% endblock %}
