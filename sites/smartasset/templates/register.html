{% extends "base.html" %}
{% block title %}Create Account | SmartAsset{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:40px auto;">
  <h1>Create a free account</h1>
  <p class="muted">Save calculations, track advisor matches, and join the SmartMoney Minute newsletter.</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="password">Password (6+ chars)</label>
      <input type="password" id="password" name="password" minlength="6" required>
    </div>
    <div class="field">
      <label for="state">State (optional)</label>
      <input type="text" id="state" name="state" maxlength="2" placeholder="NY">
    </div>
    <button class="btn" style="width:100%;" type="submit">Create account</button>
  </form>
  <p class="muted" style="text-align:center;margin-top:16px;">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
