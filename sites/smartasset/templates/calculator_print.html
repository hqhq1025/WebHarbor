<!doctype html>
<html><head><meta charset="utf-8"><title>{{ spec.title }} — Print</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
<style>body{padding:30px;font-family:sans-serif;}h1{color:#003459;}</style>
</head><body>
<h1>{{ spec.title }}</h1>
<p>SmartAsset.com — printed {{ now().strftime('%B %d, %Y') }}</p>
<h2>Inputs</h2>
<table>
  {% for k, v in inputs.items() %}
    <tr><th>{{ k }}</th><td>{{ v }}</td></tr>
  {% endfor %}
</table>
{% if result %}
  <h2>Result</h2>
  <p><strong>{{ result.headline }}</strong></p>
  <pre style="background:#f7f5ef;padding:14px;border:1px solid #e3dccc;">{{ result }}</pre>
{% endif %}
<button onclick="window.print()">Print</button>
</body></html>
