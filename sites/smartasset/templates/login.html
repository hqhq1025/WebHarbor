{% extends "base.html" %}
{% block title %}Sign In | SmartAsset{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:40px auto;">
  <h1>Sign in to SmartAsset</h1>
  <p class="muted">Access your saved calculations and advisor matches.</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button class="btn" style="width:100%;" type="submit">Sign In</button>
  </form>
  <p class="muted" style="text-align:center;margin-top:16px;">New here? <a href="{{ url_for('register') }}">Create a free account</a></p>
</div>
{% endblock %}
