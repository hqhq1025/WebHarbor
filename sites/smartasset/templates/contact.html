{% extends "base.html" %}
{% block title %}Contact Us | SmartAsset{% endblock %}
{% block content %}
<h1>Contact SmartAsset</h1>
<p class="muted">Questions about a calculator, an advisor match, or our platform? Drop us a note — we reply within two business days.</p>

{% set f = form or {} %}
<form method="post" action="{{ url_for('contact') }}" class="card" style="max-width:560px;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field">
    <label for="name">Your name</label>
    <input type="text" id="name" name="name" value="{{ f.get('name', '') }}" required>
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ f.get('email', '') }}" required>
  </div>
  <div class="field">
    <label for="topic">Topic</label>
    <select id="topic" name="topic">
      {% for t in ['General question', 'Calculator issue', 'Advisor match question', 'Press inquiry', 'Careers'] %}
        <option value="{{ t }}" {% if f.get('topic') == t %}selected{% endif %}>{{ t }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="body">Message</label>
    <textarea id="body" name="body" rows="5" required>{{ f.get('body', '') }}</textarea>
  </div>
  <button class="btn" type="submit">Send</button>
</form>
{% endblock %}
