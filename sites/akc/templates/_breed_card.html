<article class="breed-card">
  <a class="breed-art" href="{{ url_for('breed_detail', slug=breed.slug) }}">
    <img src="{{ url_for('breed_art', slug=breed.slug) }}" alt="{{ breed.name }}">
  </a>
  <div class="breed-card-body">
    <div class="eyebrow">{{ breed.group }} Group</div>
    <h3><a href="{{ url_for('breed_detail', slug=breed.slug) }}">{{ breed.name }}</a></h3>
    <p>{{ breed.temperament }}</p>
    <dl class="stat-row">
      <div><dt>Size</dt><dd>{{ breed.size }}</dd></div>
      <div><dt>Energy</dt><dd>{{ breed.energy }}/5</dd></div>
      <div><dt>Grooming</dt><dd>{{ breed.grooming }}/5</dd></div>
    </dl>
  </div>
</article>
