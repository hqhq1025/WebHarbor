{% extends "base.html" %}
{% block title %}Create Profile{% endblock %}
{% block content %}
<section class="auth-panel">
  <form method="post">
    <h1>Create AKC Profile</h1>
    <label>Name <input name="display_name" required></label>
    <label>Username <input name="username" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Password <input name="password" type="password" value="TestPass123!"></label>
    <label>Household <input name="household" value="Apartment"></label>
    <label>Activity level <input name="activity_level" value="Moderate"></label>
    <label>Experience <input name="experience" value="First-time owner"></label>
    <button type="submit">Create Profile</button>
  </form>
</section>
{% endblock %}
