{% extends 'base.html' %}
{% block title %}Sign in - IMDb{% endblock %}
{% block content %}
<h1>Sign in</h1>
<form method="post" class="form">
  <label>Email <input type="email" name="email" required></label>
  <label>Password <input type="password" name="password" required></label>
  <button class="btn" type="submit">Sign in</button>
</form>
<p>New here? <a href="{{ url_for('register') }}">Create an account</a>.</p>
<p class="muted">Demo accounts: alice.j@test.com / bob.c@test.com / carol.d@test.com / david.k@test.com &mdash; password <code>TestPass123!</code></p>
{% endblock %}
