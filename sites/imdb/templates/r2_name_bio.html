{% extends 'base.html' %}
{% block title %}Bio &mdash; {{ person.name }}{% endblock %}
{% block content %}
<a class="crumb" href="{{ url_for('name_detail', nm_id=person.nm_id) }}">&lsaquo; {{ person.name }}</a>
<h1>Biography &mdash; {{ person.name }}</h1>
{% if person.photo_path %}
<img class="person-photo" src="{{ url_for('static', filename='images/' ~ person.photo_path) }}" alt="" style="max-width:200px">
{% endif %}
<article class="bio-full">
  {% if full_bio %}
  <p>{{ full_bio }}</p>
  {% else %}
  <p>No biography on file.</p>
  {% endif %}
</article>
{% endblock %}
