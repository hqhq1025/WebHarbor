{% extends 'base.html' %}
{% block title %}{{ page_title }} - IMDb{% endblock %}
{% block content %}
<article class="info-page" style="max-width:760px;margin:24px auto;padding:0 16px;">
  <h1>{{ page_title }}</h1>
  {% for para in body %}
    <p>{{ para }}</p>
  {% endfor %}
  {% if back_to_help %}
    <p class="muted"><a href="{{ url_for('help_page') }}">Back to Help</a></p>
  {% endif %}
</article>
{% endblock %}
