{% extends "base.html" %}
{% block title %}Sweepstakes | Rotten Tomatoes{% endblock %}
{% block content %}
<div class="sweepstakes-index">
    <h1>Sweepstakes & Giveaways</h1>
    <div class="sweep-grid">
        {% for s in sweepstakes %}
        <a href="/sweepstakes/{{ s.slug }}" class="sweep-card">
            <img src="{{ s.image }}" alt="{{ s.title }}" onerror="this.onerror=null;this.src='/static/icons/placeholder.png'">
            <h3>{{ s.title }}</h3>
            <p>{{ s.description }}</p>
            <p class="meta">Ends {{ s.ends_on }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
