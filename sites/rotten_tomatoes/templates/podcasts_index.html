{% extends "base.html" %}
{% block title %}Podcasts | Rotten Tomatoes{% endblock %}
{% block content %}
<div class="podcasts-index">
    <h1>Rotten Tomatoes Podcasts</h1>
    <div class="podcast-grid">
        {% for p in podcasts %}
        <a href="/podcasts/{{ p.slug }}" class="podcast-card">
            <img loading="lazy" decoding="async" src="{{ p.image }}" alt="{{ p.title }}" onerror="this.onerror=null;this.src='/static/icons/placeholder.png'">
            <h3>{{ p.title }}</h3>
            <p>{{ p.description }}</p>
            <p class="meta">Hosted by {{ p.host }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
