{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Create Account</h1>
    <p class="form-subtitle">Join the Allrecipes community</p>
    <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:0.9rem;color:#666">
        Already have an account? <a href="{{ url_for('login') }}">Log In</a>
    </p>
</div>
{% endblock %}
