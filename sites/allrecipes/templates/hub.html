{% extends "base.html" %}
{% block title %}{{ hub_title }}{% endblock %}
{% block content %}
<div class="hub-page" style="max-width:1100px;margin:32px auto;padding:0 20px;">
    <h1>{{ hub_title }}</h1>
    {% if hub_intro %}<p style="color:#555;max-width:760px;font-size:1.05rem;">{{ hub_intro }}</p>{% endif %}
    <div class="hub-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:28px;">
        {% for c in categories %}
        <a href="{{ url_for('category_page', slug=c.slug) }}" class="hub-card"
           style="display:block;border:1px solid #ddd;border-radius:8px;background:#fff;
                  padding:18px;text-decoration:none;color:#222;">
            <h2 style="margin:0 0 8px 0;font-size:1.2rem;">{{ c.name }}</h2>
            <p style="margin:0;color:#555;font-size:0.92rem;line-height:1.4;">{{ c.description }}</p>
            <p style="margin-top:12px;color:#9e2a26;font-size:0.85rem;font-weight:600;">Browse {{ c.name }} &rarr;</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
