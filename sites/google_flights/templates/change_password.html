{% extends "base.html" %}
{% block title %}Change password | Google Flights{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Change password</h1>
    <p class="auth-subtitle">Use at least 6 characters</p>
    <form method="POST" action="{{ url_for('change_password') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-field">
        <label for="current_password">Current password</label>
        <input type="password" name="current_password" id="current_password" required>
      </div>
      <div class="form-field">
        <label for="new_password">New password</label>
        <input type="password" name="new_password" id="new_password" required minlength="6">
      </div>
      <div class="form-field">
        <label for="confirm_password">Confirm new password</label>
        <input type="password" name="confirm_password" id="confirm_password" required minlength="6">
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">Update password</button>
        <a href="{{ url_for('account') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
