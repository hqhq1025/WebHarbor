{% extends "base.html" %}
{% block title %}Create account | Google Flights{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 24 24">
        <path fill="#4285f4" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/>
      </svg>
    </div>
    <h1 class="auth-title">Create your Google Flights account</h1>
    <p class="auth-subtitle">Track prices, save searches, and book flights</p>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-field">
          <label for="first_name">First name</label>
          <input type="text" name="first_name" id="first_name" required>
        </div>
        <div class="form-field">
          <label for="last_name">Last name</label>
          <input type="text" name="last_name" id="last_name" required>
        </div>
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
      </div>
      <div class="form-field">
        <label for="password">Password (at least 6 characters)</label>
        <input type="password" name="password" id="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
