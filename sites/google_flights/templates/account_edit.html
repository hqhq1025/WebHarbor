{% extends "base.html" %}
{% block title %}Edit profile | Google Flights{% endblock %}

{% block content %}
<div class="auth-wrap" style="max-width:640px;">
  <div class="auth-card" style="max-width:640px;">
    <h1 class="auth-title">Edit profile</h1>
    <p class="auth-subtitle">Personal information used for bookings</p>
    <form method="POST" action="{{ url_for('account_edit') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-field">
          <label for="first_name">First name</label>
          <input type="text" name="first_name" id="first_name" value="{{ current_user.first_name }}">
        </div>
        <div class="form-field">
          <label for="last_name">Last name</label>
          <input type="text" name="last_name" id="last_name" value="{{ current_user.last_name }}">
        </div>
      </div>

      <div class="form-field">
        <label for="phone">Phone</label>
        <input type="tel" name="phone" id="phone" value="{{ current_user.phone }}">
      </div>

      <div class="form-field">
        <label for="address">Address</label>
        <input type="text" name="address" id="address" value="{{ current_user.address }}">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-field">
          <label for="city">City</label>
          <input type="text" name="city" id="city" value="{{ current_user.city }}">
        </div>
        <div class="form-field">
          <label for="country">Country</label>
          <input type="text" name="country" id="country" value="{{ current_user.country }}">
        </div>
      </div>

      <div class="form-field">
        <label for="date_of_birth">Date of birth</label>
        <input type="text" name="date_of_birth" id="date_of_birth"
               value="{{ current_user.date_of_birth.isoformat() if current_user.date_of_birth else '' }}"
               placeholder="YYYY-MM-DD" maxlength="10" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" autocomplete="off" data-datepicker="single">
      </div>

      <div class="form-field">
        <label for="passport_number">Passport number</label>
        <input type="text" name="passport_number" id="passport_number" value="{{ current_user.passport_number }}">
      </div>

      <div class="form-field">
        <label for="frequent_flyer">Frequent flyer number</label>
        <input type="text" name="frequent_flyer" id="frequent_flyer" value="{{ current_user.frequent_flyer }}">
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('account') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
